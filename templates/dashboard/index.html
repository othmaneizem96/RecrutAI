<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<script>
// ✅ FIX 1 — Token vient de Flask config, jamais hardcodé
{% if config.PADDLE_ENV == 'sandbox' %}
Paddle.Environment.set('sandbox');
{% endif %}

Paddle.Initialize({
  token: "{{ config.PADDLE_VENDOR_ID }}"   // ✅ depuis variable d'environnement
});

// ── State ──────────────────────────────────────────────────────────────────
let sid='', cvFiles=[], results=[];
let usageUsed = {{ user.daily_usage_count }};
let usageLimit = {{ user.daily_limit }};

// ── Usage widget update ────────────────────────────────────────────────────
function updateUsageWidget(used, limit){
  usageUsed = used; usageLimit = limit;
  const rem = Math.max(0, limit - used);
  const pct = limit > 0 ? Math.min(100, Math.round(used/limit*100)) : 100;
  document.getElementById('usageNums').textContent = `${used} / ${limit}`;
  document.getElementById('usageSub').textContent = `${rem} restant(s) aujourd'hui`;
  const fill = document.getElementById('usageBarFill');
  fill.style.width = pct+'%';
  fill.className = 'usage-bar-fill ' + (pct>=100?'fill-full':pct>=75?'fill-warn':'fill-ok');
  const warn = document.getElementById('limitWarn');
  const full = document.getElementById('limitFull');
  const wl   = document.getElementById('warnLeft');
  if(rem === 0){
    warn.style.display='none'; full.style.display='block';
    document.getElementById('analyzeBtn').disabled=true;
  } else if(rem <= 5){
    warn.style.display='block'; full.style.display='none';
    if(wl) wl.textContent=rem;
  } else {
    warn.style.display='none'; full.style.display='none';
  }
}
updateUsageWidget({{ user.daily_usage_count }}, {{ user.daily_limit }});

// ── File Upload ────────────────────────────────────────────────────────────
const dz=document.getElementById('dropZone'), fi=document.getElementById('fileInput');
fi.addEventListener('change',e=>{uploadFiles(e.target.files);fi.value='';});
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');uploadFiles(e.dataTransfer.files);});

async function uploadFiles(files){
  const allowed=['.pdf','.docx','.doc','.txt'];
  const valid=Array.from(files).filter(f=>allowed.some(e=>f.name.toLowerCase().endsWith(e)));
  if(!valid.length){toast('⚠️ PDF, DOCX ou TXT uniquement');return;}
  const remaining = usageLimit - usageUsed;
  if(remaining === 0){toast('🚫 Limite journalière atteinte. Revenez demain ou passez Pro.');return;}
  valid.forEach(f=>{
    const n=f.name.replace(/\.[^.]+$/,'');
    if(!cvFiles.find(c=>c.name===n)) cvFiles.push({name:n,ext:f.name.split('.').pop().toLowerCase(),status:'uploading'});
  });
  renderCVList(); updateBtn();
  const fd=new FormData(); if(sid) fd.append('session_id',sid);
  valid.forEach(f=>fd.append('cvs',f));
  try{
    const r=await fetch('/upload',{method:'POST',body:fd}); const d=await r.json();
    sid=d.session_id;
    valid.forEach(f=>{const cv=cvFiles.find(c=>c.name===f.name.replace(/\.[^.]+$/,''));if(cv)cv.status='ready';});
    renderCVList(); updateBtn(); toast(`✅ ${valid.length} CV(s) prêt(s)`);
  }catch(e){toast('❌ Erreur upload');}
}

function togglePaste(){document.getElementById('pasteBox').classList.toggle('open');}
async function addPasted(){
  const n=document.getElementById('pasteName').value.trim()||`Candidat ${cvFiles.length+1}`;
  const t=document.getElementById('pasteText').value.trim();
  if(!t){toast('⚠️ Collez le texte');return;}
  const blob=new Blob([t],{type:'text/plain'}); const file=new File([blob],n+'.txt');
  const fd=new FormData(); if(sid) fd.append('session_id',sid); fd.append('cvs',file,n+'.txt');
  cvFiles.push({name:n,ext:'txt',status:'uploading'}); renderCVList();
  try{
    const r=await fetch('/upload',{method:'POST',body:fd}); const d=await r.json();
    sid=d.session_id; const cv=cvFiles.find(c=>c.name===n); if(cv) cv.status='ready';
    document.getElementById('pasteName').value=''; document.getElementById('pasteText').value='';
    renderCVList(); updateBtn(); toast(`✅ ${n} ajouté`);
  }catch(e){toast('❌ '+e.message);}
}

function removeCV(name){
  cvFiles.splice(cvFiles.findIndex(c=>c.name===name),1);
  const j=results.findIndex(r=>r._fichier===name||r.nom===name); if(j>-1) results.splice(j,1);
  renderCVList(); renderResults(); updateBtn();
}

function scoreClass(s){return s>=7?'bhi':s>=5?'bmd':'blo';}
function renderCVList(){
  document.getElementById('cvCount').textContent=cvFiles.length;
  if(!cvFiles.length){document.getElementById('cvList').innerHTML='<div class="cv-empty">Aucun CV importé</div>';return;}
  document.getElementById('cvList').innerHTML=cvFiles.map(cv=>{
    const r=results.find(x=>x._fichier===cv.name||x.nom===cv.name);
    const badge=r&&!r._error?`<span class="cv-badge ${scoreClass(r.score_global)}">${r.score_global}/10</span>`:'';
    const st=cv.status==='uploading'?'<span style="font-size:.62rem;color:#1e40af">📤</span>':cv.status==='error'?'<span style="font-size:.62rem;color:var(--red)">❌</span>':'';
    return `<div class="cv-item"><span class="cv-ext ext-${cv.ext}">${cv.ext}</span>
      <span class="cv-name">${cv.name}</span>${st}${badge}
      <button class="cv-del" onclick="removeCV('${cv.name.replace(/'/g,"\\'")}')">✕</button></div>`;
  }).join('');
}

function updateBtn(){
  const rem=usageLimit-usageUsed;
  const ok=cvFiles.some(c=>c.status==='ready') && rem > 0;
  document.getElementById('analyzeBtn').disabled=!ok;
}

// ── Analyze SSE ───────────────────────────────────────────────────────────
function startAnalysis(){
  const ready=cvFiles.filter(c=>c.status==='ready');
  if(!ready.length){toast('⚠️ Uploadez d\'abord des CV');return;}
  const rem = usageLimit - usageUsed;
  if(rem <= 0){toast('🚫 Limite journalière atteinte.');return;}
  document.getElementById('analyzeBtn').disabled=true;
  document.getElementById('progressWrap').style.display='flex';
  document.getElementById('exportRow').style.display='none';
  document.getElementById('emptyResults').style.display='none';
  document.getElementById('resultsList').innerHTML='';
  results.length=0;
  const jt=encodeURIComponent(document.getElementById('jobTitle').value||'');
  const jd=encodeURIComponent(document.getElementById('jobDesc').value||'');
  const es=new EventSource(`/analyze?session_id=${sid}&job_title=${jt}&job_desc=${jd}`);
  es.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='start'){ready.forEach(cv=>showLoader(cv.name));}
    else if(d.type==='result'){
      results.push(d.result); removeLoader(d.result._fichier);
      if(!d.result._error) renderOneResult(d.result);
      renderCVList(); setProgress(d.done,d.total,d.result.nom||d.result._fichier);
    }
    else if(d.type==='done'){
      es.close();
      document.getElementById('analyzeBtn').disabled=false;
      document.getElementById('progressWrap').style.display='none';
      document.getElementById('exportRow').style.display='flex';
      if(results.filter(r=>!r._error).length>=2) renderComparison();
      updateUsageWidget(d.used, d.limit);
      updateBtn();
      toast(`✅ ${d.ok}/${d.total} analysés — Moy. ${d.avg}/10`);
    }
    else if(d.type==='error'){
      es.close();
      document.getElementById('analyzeBtn').disabled=false;
      document.getElementById('progressWrap').style.display='none';
      if(d.limit_reached){ updateUsageWidget(d.used||usageUsed, usageLimit); updateBtn(); }
      toast(`🚫 ${d.error}`);
    }
  };
  es.onerror=()=>{
    es.close();
    document.getElementById('analyzeBtn').disabled=false;
    document.getElementById('progressWrap').style.display='none';
    toast('❌ Erreur de connexion');
  };
}

function setProgress(done,total,name){
  document.getElementById('progressText').textContent=`${done}/${total} — ${name}`;
  document.getElementById('progressFill').style.width=Math.round(done/total*100)+'%';
}
function showLoader(name){
  const d=document.createElement('div');d.id='ld-'+name.replace(/\W/g,'_');d.className='lcard';
  d.innerHTML=`<div class="spin"></div><div><div class="lname">${name}</div><div class="lsub">Analyse en cours…</div></div>`;
  document.getElementById('resultsList').appendChild(d);
}
function removeLoader(name){const e=document.getElementById('ld-'+name.replace(/\W/g,'_'));if(e)e.remove();}

function scolor(s){return s>=8?'var(--green)':s>=6?'var(--amber)':'var(--red)';}
function rcls(r){return r.includes('recommandé')?'rg':r.includes('considérer')?'ra':'rr';}
function rico(r){return r.includes('recommandé')?'✅':r.includes('considérer')?'⚠️':'❌';}

function renderOneResult(r){
  const el=document.createElement('div');el.id='res-'+r._fichier;el.className='rcard';
  const nom=r.nom||r._fichier;
  const init=nom.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const s=r.score_global,reco=r.recommandation||'';
  const sk=r.competences_techniques||[],pros=r.points_forts||[],cons=r.points_faibles||[];
  el.innerHTML=`
    <div class="rch">
      <div class="rcl"><div class="ava">${init}</div>
        <div style="min-width:0"><div class="rcname">${nom}</div><div class="rctitle">${r.poste_actuel||'—'}</div></div>
      </div>
      <div class="sblk"><div class="snum" style="color:${scolor(s)}">${s}</div><div class="sden">/ 10</div></div>
    </div>
    <div class="rcb">
      <div class="igrid">
        <div class="ichip"><div class="ilbl">Expérience</div><div class="ival">${r.experience_annees} ans · ${r.niveau}</div></div>
        <div class="ichip"><div class="ilbl">Formation</div><div class="ival">${r.formation||'—'}</div></div>
        <div class="ichip"><div class="ilbl">Localisation</div><div class="ival">${r.localisation||'—'}</div></div>
        <div class="ichip"><div class="ilbl">Langues</div><div class="ival">${(r.langues||[]).join(', ')||'—'}</div></div>
        <div class="ichip"><div class="ilbl">Email</div><div class="ival" style="font-size:.69rem">${r.email||'—'}</div></div>
        <div class="ichip"><div class="ilbl">Adéquation</div><div class="ival" style="color:${scolor(s)};font-weight:600">${r.adequation_poste}%</div></div>
      </div>
      ${sk.length?`<div><div style="font-size:.59rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:.28rem">Compétences</div>
        <div class="chips">${sk.slice(0,12).map(x=>`<span class="chip">${x}</span>`).join('')}</div></div>`:''}
      <div class="sgrid">
        ${[['Compét.',r.score_competences],['Expér.',r.score_experience],['Format.',r.score_formation],['Global',s]].map(([l,v])=>`
          <div class="sbar"><div class="slbl">${l}</div><div class="strk"><div class="sfil" style="width:${(v||0)*10}%"></div></div>
          <div class="sval">${v}/10</div></div>`).join('')}
      </div>
      <div class="quote">${r.resume_recruteur||nom}</div>
      ${(pros.length||cons.length)?`<div class="pc">
        <div class="pb"><div class="pch">Points forts</div><ul>${pros.map(p=>`<li>${p}</li>`).join('')}</ul></div>
        <div class="cb"><div class="pch">Points faibles</div><ul>${cons.map(c=>`<li>${c}</li>`).join('')}</ul></div>
      </div>`:''}
      <div class="rbar ${rcls(reco)}"><span>${rico(reco)}</span><strong>${reco}</strong></div>
    </div>`;
  document.getElementById('resultsList').appendChild(el);
}

function renderResults(){
  document.getElementById('resultsList').innerHTML='';
  const ok=results.filter(r=>!r._error);
  if(!ok.length){document.getElementById('emptyResults').style.display='flex';return;}
  document.getElementById('emptyResults').style.display='none';
  ok.forEach(renderOneResult);
}

function renderComparison(){
  const ok=results.filter(r=>!r._error).sort((a,b)=>b.score_global-a.score_global);
  if(ok.length<2){document.getElementById('emptyCompare').style.display='flex';return;}
  document.getElementById('emptyCompare').style.display='none';
  const tot=ok.length,avg=(ok.reduce((s,r)=>s+r.score_global,0)/tot).toFixed(1);
  const rec=ok.filter(r=>r.recommandation.includes('recommandé')).length;
  const con=ok.filter(r=>r.recommandation.includes('considérer')).length;
  const nr=ok.filter(r=>r.recommandation.includes('Non')).length;
  const md=['🥇','🥈','🥉'];
  document.getElementById('compareContent').innerHTML=`
    <div class="srow">
      <div class="scard sc-c"><div class="sv">${tot}</div><div class="sl">Total</div></div>
      <div class="scard sc-c"><div class="sv">${avg}</div><div class="sl">Moy. /10</div></div>
      <div class="scard sc-g"><div class="sv">${rec}</div><div class="sl">Recommandés</div></div>
      <div class="scard sc-a"><div class="sv">${con}</div><div class="sl">À considérer</div></div>
      <div class="scard sc-r"><div class="sv">${nr}</div><div class="sl">Non retenus</div></div>
    </div>
    <div class="ctbl-wrap">
      <table class="ctbl">
        <thead><tr><th>Rang</th><th>Candidat</th><th>Score</th><th>Adéq.</th><th>Exp.</th><th>Compétences</th><th>Recommandation</th></tr></thead>
        <tbody>${ok.map((r,i)=>`<tr${i===0?' class="brow"':''}>
          <td><span class="rpill">${md[i]||'#'+(i+1)}</span></td>
          <td><strong>${r.nom}</strong><br><span style="font-size:.67rem;color:var(--text3)">${r.niveau||''}</span></td>
          <td><strong style="color:${scolor(r.score_global)}">${r.score_global}/10</strong></td>
          <td style="font-weight:600;color:${scolor(r.score_global)}">${r.adequation_poste}%</td>
          <td>${r.experience_annees} ans</td>
          <td style="font-size:.71rem">${(r.competences_techniques||[]).slice(0,3).join(', ')||'—'}</td>
          <td><span class="rbar ${rcls(r.recommandation)}" style="padding:3px 8px;font-size:.69rem;display:inline-flex;gap:.22rem">${rico(r.recommandation)} ${r.recommandation}</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

function showTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active'); btn.classList.add('active');
}
function doExport(type){
  if(!sid){toast('⚠️ Lancez d\'abord une analyse');return;}
  const jt=encodeURIComponent(document.getElementById('jobTitle').value||'Poste');
  window.location.href=`/export/${type}/${sid}?job_title=${jt}`;
}
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
}

// ✅ FIX 2 — priceId depuis Flask config, PLUS customData avec user_id pour le webhook
function upgradeToPro() {
  const btn = document.getElementById('upgradeBtn');
  if(btn){ btn.disabled=true; btn.textContent='Chargement…'; }

  Paddle.Checkout.open({
    items: [{
      priceId: "{{ config.PADDLE_PRODUCT_ID }}",  // ✅ depuis variable d'environnement
      quantity: 1
    }],
    // ✅ FIX 3 — OBLIGATOIRE : le webhook utilise user_id pour identifier l'utilisateur
    customData: {
      user_id: "{{ current_user.id }}",            // ✅ ID Flask transmis à Paddle
      email:   "{{ current_user.email }}"
    },
    // ✅ FIX 4 — Page de confirmation après paiement
    successUrl: "{{ url_for('payment.success', _external=True) }}"
  });

  // Réactiver le bouton si l'utilisateur ferme le checkout
  setTimeout(()=>{
    if(btn){ btn.disabled=false; btn.textContent='⭐ Passer Pro — 9,99 $/mois'; }
  }, 8000);
}
</script>
