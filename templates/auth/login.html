{% extends "base.html" %}
{% block title %}Connexion — RecrutAI{% endblock %}

{% block content %}
<div class="form-wrap">
  <div class="form-card">
    <div class="form-title">Connexion</div>
    <div class="form-sub">Analysez vos CVs en quelques secondes.</div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="vous@exemple.com" required autofocus />
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.9rem">
        <input type="checkbox" id="remember" name="remember" style="accent-color:var(--caramel)" />
        <label for="remember" style="font-size:.78rem;margin:0;cursor:pointer">Se souvenir de moi</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Se connecter →</button>
    </form>

    <div class="form-link">
      Pas encore de compte ? <a href="{{ url_for('auth.register') }}">S'inscrire gratuitement</a>
    </div>
  </div>
</div>
{% endblock %}
